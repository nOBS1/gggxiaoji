<!DOCTYPE html>
<html>
<head>
  <title>调试 localStorage</title>
</head>
<body>
  <h1>localStorage 调试工具</h1>
  <button onclick="checkStorage()">检查存档</button>
  <button onclick="clearStorage()">清除存档</button>
  <pre id="output"></pre>

  <script>
    function checkStorage() {
      const output = document.getElementById('output');
      const saved = localStorage.getItem('xiaoji-game-v2');
      
      if (saved) {
        output.textContent = '存档内容:\n' + JSON.stringify(JSON.parse(saved), null, 2);
        
        const data = JSON.parse(saved);
        output.textContent += '\n\n=== 检查危险字段 ===\n';
        output.textContent += `'__proto__' in data: ${'__proto__' in data}\n`;
        output.textContent += `'constructor' in data: ${'constructor' in data}\n`;
        output.textContent += `'prototype' in data: ${'prototype' in data}\n`;
        
        output.textContent += '\n=== data 的所有键 ===\n';
        output.textContent += Object.keys(data).join(', ');
      } else {
        output.textContent = '没有找到存档';
      }
    }
    
    function clearStorage() {
      localStorage.removeItem('xiaoji-game-v2');
      alert('存档已清除');
    }
    
    // 自动检查
    checkStorage();
  </script>
</body>
</html>
