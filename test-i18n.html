<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>i18n Test</title>
</head>
<body>
  <h1>i18n 键测试</h1>
  <div id="output"></div>
  
  <script type="module">
    import { i18n, t } from './src/js/i18n.js';
    
    const output = document.getElementById('output');
    
    try {
      // 测试升级相关的键
      output.innerHTML += `<h2>中文 (zh):</h2>`;
      output.innerHTML += `<p>upgradeTitle: ${t(i18n, 'zh', 'upgradeTitle')}</p>`;
      output.innerHTML += `<p>upgradeSubtitle: ${t(i18n, 'zh', 'upgradeSubtitle')}</p>`;
      output.innerHTML += `<p>upgradeName.level: ${t(i18n, 'zh', 'upgradeName.level')}</p>`;
      output.innerHTML += `<p>upgradeDesc.level: ${t(i18n, 'zh', 'upgradeDesc.level')}</p>`;
      output.innerHTML += `<p>upgradeName.luckyChance: ${t(i18n, 'zh', 'upgradeName.luckyChance')}</p>`;
      output.innerHTML += `<p>upgradeDesc.luckyChance: ${t(i18n, 'zh', 'upgradeDesc.luckyChance')}</p>`;
      
      output.innerHTML += `<h2>英文 (en):</h2>`;
      output.innerHTML += `<p>upgradeTitle: ${t(i18n, 'en', 'upgradeTitle')}</p>`;
      output.innerHTML += `<p>upgradeSubtitle: ${t(i18n, 'en', 'upgradeSubtitle')}</p>`;
      output.innerHTML += `<p>upgradeName.level: ${t(i18n, 'en', 'upgradeName.level')}</p>`;
      output.innerHTML += `<p>upgradeDesc.level: ${t(i18n, 'en', 'upgradeDesc.level')}</p>`;
      
      output.innerHTML += `<h2 style="color: green;">✅ i18n 模块加载成功！所有键都存在。</h2>`;
    } catch (error) {
      output.innerHTML += `<h2 style="color: red;">❌ 错误: ${error.message}</h2>`;
      output.innerHTML += `<pre>${error.stack}</pre>`;
    }
  </script>
</body>
</html>
