# Cloudflare Workers 配置文件
# 小趣闻·啄米鸡 后端 API

name = "xiaoji-game-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Workers 路由配置
# routes = [
#   { pattern = "api.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]

# 生产环境配置
[env.production]
name = "xiaoji-game-api-prod"

[env.production.vars]
CORS_ORIGIN = "https://yourdomain.com"
GOOGLE_REDIRECT_URI = "https://xiaoji-game-api.YOUR_USERNAME.workers.dev/api/auth/google/callback"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "xiaoji-game-db"
database_id = "your-database-id-here"  # 运行 wrangler d1 create 后填入

# KV 命名空间（用于缓存）
[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-namespace-id-here"

# 环境变量（公开的，非敏感信息）
[vars]
JWT_SECRET = "your-secret-key-here-change-in-production"
API_VERSION = "v1"
CORS_ORIGIN = "http://localhost:3000,http://localhost:5173"

# Supabase 配置（公开的 URL）
SUPABASE_URL = "https://rfckzemofzlbixicfnib.supabase.co"

# Google OAuth 配置（公开部分）
GOOGLE_CLIENT_ID = "your_google_client_id_here.apps.googleusercontent.com"
GOOGLE_REDIRECT_URI = "http://localhost:8787/api/auth/google/callback"

# 开发环境配置
[env.development]
name = "xiaoji-game-api-dev"

[env.development.vars]
CORS_ORIGIN = "*"
GOOGLE_REDIRECT_URI = "http://localhost:8787/api/auth/google/callback"

# 本地开发配置
[env.local]
name = "xiaoji-game-api-local"

# 构建配置
[build]
command = ""

# 兼容性标志
[compatibility_flags]
nodejs_compat = true
