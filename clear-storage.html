<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>清除存档</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: center;
    }
    button {
      background: #f44336;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }
    button:hover {
      background: #d32f2f;
    }
    .success {
      color: green;
      font-weight: bold;
      margin-top: 20px;
    }
    .info {
      background: #2196F3;
    }
    .info:hover {
      background: #1976D2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐔小鸡·生蛋</h1>
    <h2>存档管理工具</h2>
    <p>如果游戏出现问题，可以清除本地存档重新开始</p>
    
    <button onclick="clearStorage()">🗑️ 清除存档</button>
    <button class="info" onclick="location.href='/'">🏠 返回游戏</button>
    
    <div id="message"></div>
  </div>
  
  <script>
    function clearStorage() {
      try {
        // 清除游戏存档
        localStorage.removeItem('xiaoji-game-v2');
        
        // 显示成功消息
        const msg = document.getElementById('message');
        msg.innerHTML = '<p class="success">✅ 存档已清除！<br>请返回游戏页面并刷新。</p>';
        
        console.log('✅ localStorage 已清除');
      } catch (e) {
        alert('清除失败: ' + e.message);
      }
    }
    
    // 显示当前存档信息
    window.onload = function() {
      const saved = localStorage.getItem('xiaoji-game-v2');
      if (saved) {
        console.log('当前存档:', JSON.parse(saved));
      } else {
        console.log('没有找到存档');
      }
    };
  </script>
</body>
</html>
