<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="三国卡牌合成小游戏。拆卡包收集武将，消耗重复卡合成升星。"
    />
    <title>三国卡牌合成</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>策</text></svg>"
    />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-labelledby="gameTitle">
        <header class="game-hero">
          <div>
            <p class="game-kicker">Three Kingdoms Cards</p>
            <h1 id="gameTitle">三国卡牌合成</h1>
          </div>
          <button class="secondary-action" id="resetGameBtn" type="button">重置存档</button>
        </header>

        <div id="cardGameRoot"></div>
      </section>
    </main>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
