<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="合成方块小游戏。移动数字方块，合成更高数字，挑战最高分。"
    />
    <title>合成方块小游戏</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>▣</text></svg>"
    />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel tab-content active" data-content="main" aria-labelledby="gameTitle">
        <header class="game-hero">
          <div>
            <p class="game-kicker">Merge Block</p>
            <h1 id="gameTitle">合成方块</h1>
          </div>
          <button class="secondary-action" id="resetBestBtn" type="button">清除最高分</button>
        </header>

        <div class="merge-game-container" id="mergeGameContainer"></div>
      </section>
    </main>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
